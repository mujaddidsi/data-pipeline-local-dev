version: '3.8'
services:
  localstack:
    image: localstack/localstack:3.0.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,iam
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
